name: Daily Gaiad Discord Post

on:
  schedule:
    - cron: "5 0 * * *"  # Every day at 00:05 UTC
  workflow_dispatch:       # Manual trigger for testing

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Post today's chapter to Discord
        env:
          DISCORD_WEBHOOKS: ${{ secrets.DISCORD_WEBHOOKS }}
        run: python discord-bot/post_daily.py
