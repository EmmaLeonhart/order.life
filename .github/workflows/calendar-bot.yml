name: calendar-bot

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "What to regenerate"
        required: true
        default: "months"
        type: choice
        options:
          - months
          - days
          - years
          - all
      year_start:
        description: "Year range start (years mode only)"
        required: false
        default: "1"
      year_end:
        description: "Year range end (years mode only)"
        required: false
        default: "12100"
  # Disabled 2026-04-16: the lifeism.miraheze.org wiki is closed and
  # every bot edit errors. Keep only workflow_dispatch so we can
  # re-enable manually if the wiki comes back. See STATUS.md and
  # memory/wiki_closure_status.md.
  #
  # schedule:
  #   - cron: "0 0 * * 0"  # weekly Sunday 00:00 UTC

concurrency:
  group: calendar-bot
  cancel-in-progress: false

jobs:
  calendar-bot:
    runs-on: ubuntu-latest
    env:
      WIKI_USERNAME: EmmaBot@EmmaBot
      WIKI_PASSWORD: ${{ secrets.WIKI_PASSWORD }}
      WIKI_API_URL: https://lifeism.miraheze.org/w/api.php
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install requests

      - name: Run calendar bot
        working-directory: calendar-lib
        run: |
          # Defaults apply when triggered by the weekly cron (no inputs).
          MODE="${{ github.event.inputs.mode }}"
          MODE="${MODE:-days}"
          YEAR_START="${{ github.event.inputs.year_start }}"
          YEAR_START="${YEAR_START:-1}"
          YEAR_END="${{ github.event.inputs.year_end }}"
          YEAR_END="${YEAR_END:-12100}"

          case "$MODE" in
            months)
              python zodiac_wiki_pages.py --months
              ;;
            days)
              python zodiac_wiki_pages.py --days
              ;;
            years)
              python zodiac_wiki_pages.py --years --year-start "$YEAR_START" --year-end "$YEAR_END"
              ;;
            all)
              python zodiac_wiki_pages.py --months --days --years --year-start "$YEAR_START" --year-end "$YEAR_END"
              ;;
          esac
