name: Compile Gaiad

on:
  push:
    branches: [master]
    paths:
      - "Gaiad/epic/chapter_*.md"
      - "scripts/compile_gaiad.py"
      - ".github/workflows/compile-gaiad.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: compile-gaiad
  cancel-in-progress: false

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: python scripts/compile_gaiad.py

      - name: Commit compilations if changed
        run: |
          git config user.name "gaiad-compile[bot]"
          git config user.email "gaiad-compile[bot]@users.noreply.github.com"
          git add Gaiad/epic/compiled/ gaiad_full.md gaiad_full_readable.md
          git diff --cached --quiet || git commit -m "Auto-compile Gaiad chapters"
          git push || echo "Push failed (concurrent update?), will retry next run"
