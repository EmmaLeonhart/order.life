name: wiki-bot

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths-ignore:
      - "wiki-pages/**"
  schedule:
    - cron: "0 0 * * *"

concurrency:
  group: wiki-bot
  cancel-in-progress: false

jobs:
  wiki-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      WIKI_USERNAME: EmmaBot@EmmaBot
      WIKI_PASSWORD: ${{ secrets.WIKI_PASSWORD }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for git revisions

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install mwclient

      - name: Run wiki bot
        run: |
          chmod +x wiki-scripts/bot_loop.sh
          wiki-scripts/bot_loop.sh
